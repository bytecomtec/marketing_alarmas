    function filterActiveCategoryProducts() {
        const query = document.getElementById('categorySearchInput').value.toLowerCase();
        const cards = document.querySelectorAll('#productsContainer .product-card');
        cards.forEach(card => {
            if (card.innerText.toLowerCase().includes(query)) card.style.display = "flex";
            else card.style.display = "none";
        });
    }

    function initMenu() {
        const menuContainer = document.getElementById('menuList');
        menuContainer.innerHTML = '';
        categoriesList.forEach(cat => {
            const li = document.createElement('li');
            const count = catalogData[cat.id] ? catalogData[cat.id].products.length : 0;
            const a = document.createElement('a');
            a.className = `category-menu-item ${cat.id === currentCategory ? 'active' : ''}`;
            a.id = `menu-${cat.id}`;
            a.onclick = () => selectCategory(cat.id);
            a.innerHTML = `<span>${cat.name}</span> <span class="qty-badge">${count}</span>`;
            li.appendChild(a);
            menuContainer.appendChild(li);
        });
        renderProducts();
    }

    function selectCategory(catId) {
        currentCategory = catId;
        document.querySelectorAll('.category-menu-item').forEach(item => item.classList.remove('active'));
        const activeItem = document.getElementById(`menu-${catId}`);
        if (activeItem) activeItem.classList.add('active');
        document.getElementById('categorySearchInput').value = '';
        renderProducts();
    }

    function calculatePrices(costUSD) {
        const rateInput = document.getElementById('exchangeRate');
        const discountSelect = document.getElementById('discountSelect');
        
        currentRate = rateInput ? parseFloat(rateInput.value) || 17.60 : 17.60;
        currentDiscount = discountSelect ? parseFloat(discountSelect.value) || 0 : 0;

        const costoMXNSinIva = costUSD * currentRate;
        const costoMXNConIva = costoMXNSinIva * 1.16;
        const basePublico = costoMXNConIva * 1.65; // PRECIO DE LISTA ORIGINAL REFERENCE
        
        let precioFinalPublico = basePublico * (1 - currentDiscount);
        
        const precioMinimoPermitido = costoMXNConIva * 1.20;
        if (precioFinalPublico < precioMinimoPermitido) precioFinalPublico = precioMinimoPermitido;
        
        const margenAsegurado = precioFinalPublico - costoMXNConIva;
        
        return { costoMXNConIva, basePublico, precioFinalPublico, margenAsegurado };
    }

    function renderProducts() {
        const container = document.getElementById('productsContainer');
        const titleEl = document.getElementById('categoryTitle');
        const descEl = document.getElementById('categoryDesc');
        container.innerHTML = '';

        if (!catalogData[currentCategory] || catalogData[currentCategory].products.length === 0) {
            const catName = categoriesList.find(c => c.id === currentCategory)?.name || currentCategory;
            titleEl.innerText = `Línea: ${catName}`;
            descEl.innerText = catalogData[currentCategory]?.desc || `Módulo asignado a la ingeniería de ${catName.toLowerCase()}.`;
            container.innerHTML = `<p style="grid-column: 1/-1; color: #64748b; font-style: italic; padding: 30px 0;">Las soluciones de hardware se encuentran en proceso de indexación técnica.</p>`;
            return;
        }

        const categoryInfo = catalogData[currentCategory];
        titleEl.innerText = categoryInfo.title;
        descEl.innerText = categoryInfo.desc;

        categoryInfo.products.forEach(product => {
            const calc = calculatePrices(product.costUSD);
            const card = document.createElement('div');
            card.className = 'product-card';

            const safeModelName = product.model.replace(/\//g, "_");
            const imgSrc = `${GITHUB_IMG_BASE}${safeModelName}.jpg`;

            let videoButtonHTML = product.videoURL ? `<a href="${product.videoURL}" target="_blank" class="btn-video">🎬 Video</a>` : '';
            let featuresHTML = product.features.map(feat => `<li>${feat}</li>`).join('');

            // RENDER DE PRECIOS: Muestra precio de lista tachado si hay descuento activo en UI
            let priceDisplayHTML = '';
            if (currentDiscount > 0 && calc.basePublico > calc.precioFinalPublico) {
                priceDisplayHTML = `
                    <span style="text-decoration: line-through; color: #94a3b8; font-size: 1rem; display: block;">Precio Lista: $${calc.basePublico.toFixed(2)} MXN</span>
                    <span class="final-price" style="color: #2563eb;">$${calc.precioFinalPublico.toFixed(2)} MXN <small style="font-size:0.8rem; background:#dbeafe; color:#1e40af; padding:2px 6px; border-radius:4px;">-${currentDiscount * 100}%</small></span>
                `;
            } else {
                priceDisplayHTML = `<span class="final-price">$${calc.precioFinalPublico.toFixed(2)} MXN</span>`;
            }

            card.innerHTML = `
                <div class="product-body">
                    <div class="product-main-info">
                        <div class="product-img-box"><img src="${imgSrc}" alt="${product.model}" onerror="this.src='byte.png'"></div>
                        <div class="product-details">
                            <div class="product-model">${product.model}</div>
                            <h3 class="product-title-specs">${product.titleSpecs}</h3>
                            <div class="product-price-list">
                                ${priceDisplayHTML}
                                <span class="usd-reference">Ref: $${product.costUSD.toFixed(2)} USD (c/IVA: $${calc.costoMXNConIva.toFixed(2)} MXN)</span>
                            </div>
                            <div class="margin-badge">Margen Real Asegurado: +$${calc.margenAsegurado.toFixed(2)} MXN</div>
                        </div>
                    </div>
                    <p style="margin: 0; font-size: 0.9rem; color: #64748b;">${product.desc}</p>
                    <ul class="product-features-list">${featuresHTML}</ul>
                </div>
                <div class="product-footer">
                    <div class="product-actions">
                        <button class="btn-prepare" onclick="prepareTechnicalSheet('${product.model}')">🖼️ Generar Tarjeta Comercial</button>
                        ${videoButtonHTML}
                    </div>
                </div>
            `;
            container.appendChild(card);
        });
    }

    function updateAllPrices() { renderProducts(); }

    /* ==========================================================================
       RENDERING: Construcción de la Ficha Comercial con Lógica de Precios Tachados
       ========================================================================== */
    function prepareTechnicalSheet(modelCode) {
        const product = catalogData[currentCategory].products.find(p => p.model === modelCode);
        if (!product) return;

        activeProductModel = product.model;
        const calc = calculatePrices(product.costUSD);
        const safeModelName = product.model.replace(/\//g, "_");
        const productImgUrl = `${GITHUB_IMG_BASE}${safeModelName}.jpg`;

        const canvas = document.getElementById('processingCanvas');
        const ctx = canvas.getContext('2d');

        canvas.width = 450;
        canvas.height = 750;

        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, 450, 750);

        ctx.fillStyle = '#003366';
        ctx.fillRect(0, 0, 450, 110);
        
        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 18px sans-serif';
        ctx.fillText('SOLUCIONES DE INGENIERÍA PERIMETRAL', 25, 45);
        
        ctx.fillStyle = '#ff6600';
        ctx.font = 'bold 13px sans-serif';
        ctx.fillText('FICHA COMERCIAL DE HARDWARE - BYTECOMTEC', 25, 75);

        ctx.fillStyle = '#003399';
        ctx.font = 'bold 22px sans-serif';
        ctx.fillText(`MODELO: ${product.model}`, 30, 155);

        ctx.fillStyle = '#1e293b';
        ctx.font = '15px sans-serif';
        let nextY = wrapText(ctx, product.titleSpecs, 30, 190, 390, 22);

        // EVALUACIÓN DE DESCUENTOS PARA EL RENDER EN CANVAS
        let priceY = nextY + 35;
        if (currentDiscount > 0 && calc.basePublico > calc.precioFinalPublico) {
            // 1. Dibujar texto del "Precio de Lista original" en color gris neutro
            ctx.fillStyle = '#94a3b8';
            ctx.font = 'bold 16px sans-serif';
            let listPriceText = `Precio Lista: $${calc.basePublico.toFixed(2)} MXN`;
            ctx.fillText(listPriceText, 30, priceY);

            // 2. Trazar línea roja encima de dicho precio (Efecto Tachado)
            let textWidth = ctx.measureText(listPriceText).width;
            ctx.strokeStyle = '#d32f2f';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(30, priceY - 5);
            ctx.lineTo(30 + textWidth, priceY - 5);
            ctx.stroke();

            // 3. Posicionar el nuevo precio rebajado abajo de forma dominante
            priceY += 30;
            ctx.fillStyle = '#2563eb'; // Azul promocional limpio
            ctx.font = 'bold 25px sans-serif';
            ctx.fillText(`Oferta Especial: $${calc.precioFinalPublico.toFixed(2)} MXN`, 30, priceY);
        } else {
            // Si no hay descuento, dibuja el precio normal directamente
            ctx.fillStyle = '#003366';
            ctx.font = 'bold 24px sans-serif';
            ctx.fillText(`Precio Público: $${calc.precioFinalPublico.toFixed(2)} MXN`, 30, priceY);
        }

        let imgBoxY = priceY + 25;
        let boxY = imgBoxY + 195; 

        // Si el precio se desplazó hacia abajo por la oferta, reajustamos el límite si es necesario
        if (boxY > 600) { boxY = 590; }

        ctx.fillStyle = '#f8fafc';
        ctx.fillRect(30, boxY, 390, 75);
        ctx.strokeStyle = '#e2e8f0';
        ctx.strokeRect(30, boxY, 390, 75);
        
        ctx.fillStyle = '#d32f2f';
        ctx.font = 'bold 14px sans-serif';
        ctx.fillText('Cotización sujeta a diagnóstico en sitio.', 45, boxY + 30);
        ctx.fillText('No incluye mano de obra por instalación.', 45, boxY + 54);

        ctx.fillStyle = '#64748b';
        ctx.font = 'italic 12px sans-serif';
        ctx.fillText('* Vigencia ligada a existencia y tipo de cambio diario.', 30, 700);
        ctx.fillText('Bytecomtec - Soporte Técnico Autorizado.', 30, 722);

        renderCanvasImage(ctx, productImgUrl, 135, imgBoxY, 180, 180, canvas);
    }

    function renderCanvasImage(ctx, src, x, y, width, height, canvas) {
        const img = new Image();
        img.crossOrigin = "anonymous";
        img.src = src;

        img.onload = function() {
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(x, y, width, height);
            ctx.strokeStyle = '#e2e8f0';
            ctx.strokeRect(x, y, width, height);
            
            const maxDim = width - 20;
            let w = img.width;
            let h = img.height;
            if (w > h) {
                h = (h * maxDim) / w;
                w = maxDim;
            } else {
                w = (w * maxDim) / h;
                h = maxDim;
            }
            const xOffset = x + (width - w) / 2;
            const yOffset = y + (height - h) / 2;
            
            ctx.drawImage(img, xOffset, yOffset, w, h);
            openModalWithCanvasData(canvas);
        };
        img.onerror = function() {
            ctx.fillStyle = '#f1f5f9';
            ctx.fillRect(x, y, width, height);
            ctx.strokeStyle = '#cbd5e1';
            ctx.strokeRect(x, y, width, height);
            ctx.fillStyle = '#94a3b8';
            ctx.font = 'bold 13px sans-serif';
            ctx.fillText('[Imagen]', x + (width/2) - 25, y + (height/2) + 5);
            openModalWithCanvasData(canvas);
        };
    }

    function wrapText(context, text, x, y, maxWidth, lineHeight) {
        const words = text.split(' ');
        let line = '';
        let currentY = y;
        for (let n = 0; n < words.length; n++) {
            let testLine = line + words[n] + ' ';
            if (context.measureText(testLine).width > maxWidth && n > 0) {
                context.fillText(line, x, currentY);
                line = words[n] + ' ';
                currentY += lineHeight;
            } else {
                line = testLine;
            }
        }
        context.fillText(line, x, currentY);
        return currentY;
    }

    function openModalWithCanvasData(canvas) {
        const modal = document.getElementById('imageModal');
        const modalImg = document.getElementById('modalTargetImg');
        const btnAction = document.getElementById('btnClipboardAction');
        
        if (modal && modalImg) {
            modalImg.src = canvas.toDataURL('image/png');
            modal.style.display = 'flex';
            
            if (btnAction) {
                if (navigator.canShare && navigator.share) {
                    btnAction.innerText = '🚀 Compartir Ficha por WhatsApp';
                } else {
                    btnAction.innerText = '📋 Copiar Imagen al Portapapeles';
                }
                btnAction.className = 'btn-copy-clipboard';
            }
        }
    }

    function shareOrCopyCanvas() {
        const canvas = document.getElementById('processingCanvas');
        const btnAction = document.getElementById('btnClipboardAction');
        const cleanFileName = `Ficha_${activeProductModel.replace(/[^a-zA-Z0-9]/g, '_')}.png`;

        canvas.toBlob(async function(blob) {
            if (!blob) return;
            if (navigator.canShare && navigator.share) {
                try {
                    const file = new File([blob], cleanFileName, { type: 'image/png' });
                    await navigator.share({ files: [file] });
                } catch (err) {
                    console.log("Compartición omitida.");
                }
            } else {
                try {
                    await navigator.clipboard.write([new ClipboardItem({ [blob.type]: blob })]);
                    if (btnAction) {
                        btnAction.className = 'btn-copy-clipboard success';
                        btnAction.innerText = '✅ ¡Ficha Copiada! Pégala en tu chat (Ctrl+V)';
                    }
                } catch (err) {
                    alert("Mantén presionada la imagen para guardarla.");
                }
            }
        }, 'image/png');
    }

    function closeLightbox() {
        document.getElementById('imageModal').style.display = 'none';
    }

    window.onload = initMenu;
</script>
